name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-desktop.txt

      - name: Build executable
        run: |
          pyinstaller GEX_Dashboard.spec

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path "dist/GEX_Dashboard/*" -DestinationPath "dist/GEX_Dashboard_Windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: GEX_Dashboard_Windows
          path: dist/GEX_Dashboard_Windows.zip
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-desktop.txt

      - name: Build executable
        run: |
          pyinstaller GEX_Dashboard.spec

      - name: Create DMG
        run: |
          # Create DMG from app bundle
          hdiutil create -volname "GEX Dashboard" \
            -srcfolder "dist/GEX Dashboard.app" \
            -ov -format UDZO \
            "dist/GEX_Dashboard_macOS.dmg"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: GEX_Dashboard_macOS
          path: dist/GEX_Dashboard_macOS.dmg
          retention-days: 30

  build-macos-arm:
    runs-on: macos-14  # M1/ARM runner
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-desktop.txt

      - name: Build executable
        run: |
          pyinstaller GEX_Dashboard.spec

      - name: Create DMG
        run: |
          hdiutil create -volname "GEX Dashboard" \
            -srcfolder "dist/GEX Dashboard.app" \
            -ov -format UDZO \
            "dist/GEX_Dashboard_macOS_ARM.dmg"

      - name: Upload macOS ARM artifact
        uses: actions/upload-artifact@v4
        with:
          name: GEX_Dashboard_macOS_ARM
          path: dist/GEX_Dashboard_macOS_ARM.dmg
          retention-days: 30

  create-release:
    needs: [build-windows, build-macos, build-macos-arm]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/GEX_Dashboard_Windows/GEX_Dashboard_Windows.zip
            artifacts/GEX_Dashboard_macOS/GEX_Dashboard_macOS.dmg
            artifacts/GEX_Dashboard_macOS_ARM/GEX_Dashboard_macOS_ARM.dmg
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## GEX Dashboard Desktop App

            ### Downloads
            - **Windows**: `GEX_Dashboard_Windows.zip` - Extract and run `GEX_Dashboard.exe`
            - **macOS (Intel)**: `GEX_Dashboard_macOS.dmg` - Mount and drag to Applications
            - **macOS (Apple Silicon)**: `GEX_Dashboard_macOS_ARM.dmg` - Mount and drag to Applications

            ### First Run
            On first run, you'll be prompted to enter your Tastytrade API credentials.

            ### Requirements
            - **Windows**: .NET Framework 4.0+ and Edge WebView2 (usually pre-installed)
            - **macOS**: macOS 10.15 or later
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
